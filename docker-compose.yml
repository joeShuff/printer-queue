services:
  printer-queue:
    build: .
    container_name: printer-queue
    restart: unless-stopped
    ports:
      # Must be 8898 — this is the port OrcaSlicer expects for FlashForge printers.
      # Do NOT change this unless you also change OrcaSlicer's port setting.
      - "8898:8898"
    volumes:
      - printer-queue-data:/data
    environment:
      # -----------------------------------------------------------------------
      # Printer connection (required)
      # Find these on the printer touchscreen: Settings → Network → LAN Mode
      # -----------------------------------------------------------------------
      PRINTER_IP: "192.168.1.XXX"      # <-- your AD5X's static IP
      PRINTER_SERIAL: "YOUR_SERIAL"    # <-- serial number from LAN mode screen
      PRINTER_CHECK_CODE: "YOUR_CODE"  # <-- 8-digit check code from LAN mode screen

      # -----------------------------------------------------------------------
      # Camera (optional)
      # If set, the camera stream is fetched from this URL instead of from the
      # printer directly. Use this when routing through Frigate/go2rtc to work
      # around the printer camera's single-connection limit.
      # Example: http://frigate:8554/ad5x  or  http://go2rtc:1984/stream.mjpeg
      # -----------------------------------------------------------------------
      # CAMERA_STREAM_URL: ""

      DATA_DIR: "/data"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8898/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  printer-queue-data: