<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Print Queue · AD5X</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap"/>
    <style>
        body {
            margin: 0;
            background: #0F1117;
            color: #E8EAF0;
        }

        * {
            box-sizing: border-box;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #0F1117;
        }

        ::-webkit-scrollbar-thumb {
            background: #2A2D3A;
            border-radius: 3px;
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
    const {useState, useEffect, useCallback} = React;

    const API = "";

    // ── Helpers ──────────────────────────────────────────────────────────
    function fmt_time(s) {
        if (!s) return "—";
        const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
        if (h > 0) return `${h}h ${m}m`;
        if (m > 0) return `${m}m ${sec}s`;
        return `${sec}s`;
    }

    function fmt_size(b) {
        if (!b) return "—";
        if (b > 1e6) return `${(b / 1e6).toFixed(1)} MB`;
        if (b > 1e3) return `${(b / 1e3).toFixed(0)} KB`;
        return `${b} B`;
    }

    function fmt_date(ts) {
        if (!ts) return "—";
        return new Date(ts * 1000).toLocaleString(undefined, {
            month: "short", day: "numeric", hour: "2-digit", minute: "2-digit"
        });
    }

    function status_color(s) {
        return {
                queued: "text-amber-400 bg-amber-400/10 border-amber-400/30",
                sending: "text-blue-400 bg-blue-400/10 border-blue-400/30",
                sent: "text-green-400 bg-green-400/10 border-green-400/30",
                error: "text-red-400 bg-red-400/10 border-red-400/30",
                deleted: "text-slate-500 bg-slate-500/10 border-slate-500/30"
            }[s]
            || "text-slate-400 bg-slate-400/10 border-slate-400/30";
    }

    function printer_color(s) {
        const l = s?.toLowerCase();
        if (l === "printing") return "text-amber-400";
        if (l === "ready" || l === "idle") return "text-green-400";
        if (l === "offline" || l === "error") return "text-red-400";
        return "text-slate-400";
    }

    // ── Small Components ─────────────────────────────────────────────────
    function Badge({status}) {
        return (
            <span
                className={`inline-flex items-center px-2 py-0.5 rounded border text-xs font-mono uppercase tracking-wider ${status_color(status)}`}>
          {status}
        </span>
        );
    }

    function Btn({onClick, disabled, loading, variant = "default", children}) {
        const v = {
            default: "bg-slate-700 hover:bg-slate-600 text-slate-100 border-slate-600",
            primary: "bg-amber-500 hover:bg-amber-400 text-slate-900 border-amber-400",
            danger: "bg-red-500/20 hover:bg-red-500/30 text-red-400 border-red-500/40",
        }[variant];
        return (
            <button onClick={onClick} disabled={disabled || loading}
                    className={`inline-flex items-center gap-2 px-4 py-2 rounded font-mono text-sm font-medium border transition-all duration-150 disabled:opacity-40 disabled:cursor-not-allowed ${v}`}>
                {loading && <svg className="animate-spin w-3.5 h-3.5" fill="none" viewBox="0 0 24 24">
                    <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
                    <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
                </svg>}
                {children}
            </button>
        );
    }

    function Stat({label, value, color, mono, truncate}) {
        return (
            <div>
                <div className="text-xs text-slate-500 uppercase tracking-wider mb-0.5">{label}</div>
                <div
                    className={`text-sm ${mono ? "font-mono" : ""} ${color || "text-slate-200"} ${truncate ? "truncate" : ""}`}
                    title={truncate ? value : undefined}>
                    {value ?? "—"}
                </div>
            </div>
        );
    }

    function Toast({toasts}) {
        return (
            <div className="fixed bottom-6 right-6 flex flex-col gap-2 z-50 pointer-events-none">
                {toasts.map(t => (
                    <div key={t.id} className={`px-4 py-3 rounded border font-mono text-sm shadow-xl
              ${t.type === "error"
                        ? "bg-red-950 border-red-500/50 text-red-300"
                        : "bg-green-950 border-green-500/50 text-green-300"}`}>
                        {t.msg}
                    </div>
                ))}
            </div>
        );
    }

    // ── Connection Info Modal ─────────────────────────────────────────────
    function ConnectionModal({onClose}) {
        const [info, setInfo] = useState(null);
        const [copied, setCopied] = useState(null);

        useEffect(() => {
            fetch(`${API}/server/info`).then(r => r.json()).then(setInfo).catch(() => {});
        }, []);

        function copy(label, val) {
            navigator.clipboard.writeText(val).then(() => {
                setCopied(label);
                setTimeout(() => setCopied(null), 1500);
            });
        }

        function Field({label, value}) {
            return (
                <div className="flex items-center justify-between gap-4 py-2 border-b border-slate-700/60 last:border-0">
                    <span className="text-xs text-slate-500 uppercase tracking-wider w-24 shrink-0">{label}</span>
                    <span className="font-mono text-sm text-slate-200 flex-1 truncate">{value ?? "—"}</span>
                    <button onClick={() => copy(label, value)}
                            className="text-xs font-mono text-slate-500 hover:text-amber-400 transition-colors shrink-0 px-1.5 py-0.5 rounded hover:bg-amber-400/10">
                        {copied === label ? "✓" : "Copy"}
                    </button>
                </div>
            );
        }

        return (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4"
                 style={{background: "rgba(0,0,0,0.7)", backdropFilter: "blur(4px)"}}
                 onClick={onClose}>
                <div className="rounded-xl border border-slate-700 bg-slate-900 w-full max-w-sm shadow-2xl"
                     onClick={e => e.stopPropagation()}>
                    <div className="px-5 py-4 border-b border-slate-700 flex items-center justify-between">
                        <div>
                            <div className="font-mono text-sm font-bold text-slate-100">OrcaSlicer Connection</div>
                            <div className="font-mono text-xs text-slate-500 mt-0.5">Enter these details in OrcaSlicer → Printer settings</div>
                        </div>
                        <button onClick={onClose} className="text-slate-500 hover:text-slate-300 transition-colors">
                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/>
                            </svg>
                        </button>
                    </div>

                    <div className="px-5 py-3">
                        <div className="text-xs font-mono text-amber-400 uppercase tracking-wider mb-2">This proxy server</div>
                        <Field label="Host / IP" value={info?.proxy?.host}/>
                        <Field label="Port" value={String(info?.proxy?.port ?? 8898)}/>
                        <Field label="Serial" value={info?.proxy?.serial}/>
                        <Field label="Check Code" value={info?.proxy?.check_code}/>
                    </div>

                    <div className="px-5 py-3 border-t border-slate-700/60">
                        <div className="text-xs font-mono text-slate-600 uppercase tracking-wider mb-2">Real printer (do not use in OrcaSlicer)</div>
                        <div className="text-xs font-mono text-slate-500">IP: {info?.printer?.ip ?? "—"}</div>
                    </div>
                </div>
            </div>
        );
    }

    // ── Printer Panel ─────────────────────────────────────────────────────
    function PrinterPanel({printer, loading, onControl}) {
        const [expanded, setExpanded] = useState(false);
        const [showConn, setShowConn]  = useState(false);

        const state    = printer?.state ?? "—";
        const col      = printer_color(state);
        const printing = state?.toLowerCase() === "printing";
        const paused   = state?.toLowerCase() === "pause" || state?.toLowerCase() === "paused";
        const active   = printing || paused;

        const progress = printer?.progress != null
            ? (printer.progress <= 1 ? Math.round(printer.progress * 100) : Math.round(printer.progress))
            : null;

        function fmt_temp(val, target) {
            if (val == null) return "—";
            return target ? `${Math.round(val)}° → ${Math.round(target)}°C` : `${Math.round(val)}°C`;
        }
        function fmt_mins(secs) {
            if (!secs) return "—";
            const h = Math.floor(secs / 3600), m = Math.floor((secs % 3600) / 60);
            return h > 0 ? `${h}h ${m}m` : `${m}m`;
        }

        // Active IFS slot info
        const currentSlot = printer?.current_slot;
        const slotInfos   = printer?.slot_infos ?? [];
        const activeSlot  = slotInfos.find(s => s.slotId === currentSlot);

        return (
            <>
                {showConn && <ConnectionModal onClose={() => setShowConn(false)}/>}

                <div className="rounded-lg border border-slate-700 bg-slate-800/60 overflow-hidden">
                    {/* Header */}
                    <div className="px-4 sm:px-5 py-3 border-b border-slate-700 flex items-center justify-between"
                         style={{background: "linear-gradient(90deg,#1a1d2e,#12141f)"}}>
                        <div className="flex items-center gap-2">
                            <svg className="w-4 h-4 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5}
                                      d="M17 17H7a2 2 0 01-2-2V5a2 2 0 012-2h10a2 2 0 012 2v10a2 2 0 01-2 2z"/>
                            </svg>
                            <span className="font-mono text-xs text-slate-400 tracking-widest uppercase">AD5X</span>
                        </div>
                        <div className="flex items-center gap-2">
                            {/* Connection details button */}
                            <button onClick={() => setShowConn(true)}
                                    title="OrcaSlicer connection details"
                                    className="px-2 py-1 rounded font-mono text-xs text-slate-500 hover:text-slate-300 hover:bg-slate-700/60 border border-transparent hover:border-slate-600 transition-all">
                                Connect
                            </button>
                            {loading && <svg className="animate-spin w-3 h-3 text-slate-600" fill="none" viewBox="0 0 24 24">
                                <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
                                <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
                            </svg>}
                            <span className={`font-mono text-sm font-bold tracking-wide ${col}`}
                                  style={{textShadow: "0 0 12px currentColor"}}>
                                {state.toUpperCase()}
                            </span>
                        </div>
                    </div>

                    {/* ── Always visible ── */}

                    {/* Print job */}
                    {(printer?.thumb_url || printer?.file) && (
                        <div className="px-4 sm:px-5 pt-4 pb-3 flex gap-3 sm:gap-4">
                            {printer?.thumb_url && (
                                <div className="shrink-0 w-20 h-20 rounded overflow-hidden border border-slate-700 bg-slate-900">
                                    <img src={printer.thumb_url} alt="Current print"
                                         className="w-full h-full object-contain"
                                         onError={e => e.target.parentElement.style.display = "none"}/>
                                </div>
                            )}
                            <div className="flex-1 min-w-0">
                                <div className="flex justify-between items-baseline mb-1.5">
                                    <span className="font-mono text-xs text-slate-400 truncate max-w-[70%]"
                                          title={printer?.file}>{printer?.file || "—"}</span>
                                    <span className="font-mono text-sm font-bold text-slate-200">{progress ?? "—"}%</span>
                                </div>
                                <div className="h-1.5 rounded-full bg-slate-700 overflow-hidden">
                                    <div className="h-full rounded-full transition-all duration-700"
                                         style={{
                                             width: `${progress ?? 0}%`,
                                             background: paused ? "#94a3b8" : "#F59E0B",
                                             boxShadow: paused ? "none" : "0 0 8px #F59E0B",
                                         }}/>
                                </div>
                                <div className="flex justify-between font-mono text-xs text-slate-500 mt-1.5">
                                    <span>Layer {printer?.current_layer ?? "—"} / {printer?.total_layers ?? "—"}</span>
                                    <span>{fmt_mins(printer?.remaining_time)} left · {fmt_mins(printer?.print_duration)} elapsed</span>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Temperatures + active filament */}
                    <div className="px-4 sm:px-5 py-3 grid grid-cols-2 gap-3 sm:grid-cols-4 border-t border-slate-700/40">
                        <Stat label="Nozzle" value={fmt_temp(printer?.nozzle_temp, printer?.nozzle_target)} mono/>
                        <Stat label="Bed"    value={fmt_temp(printer?.bed_temp,    printer?.bed_target)}    mono/>
                        <Stat label="Chamber" value={printer?.chamber_temp != null ? `${Math.round(printer.chamber_temp)}°C` : "—"} mono/>

                        {/* Active IFS slot */}
                        <div>
                            <div className="text-xs text-slate-500 uppercase tracking-wider mb-0.5">Filament</div>
                            {activeSlot ? (
                                <div className="flex items-center gap-2">
                                    <span className="w-3.5 h-3.5 rounded-full border border-slate-500 shrink-0"
                                          style={{backgroundColor: activeSlot.materialColor || "#888"}}/>
                                    <span className="font-mono text-sm text-slate-200">
                                        {activeSlot.materialName} <span className="text-slate-500">S{activeSlot.slotId}</span>
                                    </span>
                                </div>
                            ) : (
                                <span className="font-mono text-sm text-slate-500">—</span>
                            )}
                        </div>
                    </div>

                    {/* Error */}
                    {printer?.error_code && (
                        <div className="mx-5 mb-3 px-3 py-2 rounded bg-red-950/60 border border-red-500/30 text-xs font-mono text-red-400">
                            ⚠ Error: {printer.error_code}
                        </div>
                    )}

                    {/* Job controls */}
                    {active && (
                        <div className="px-4 sm:px-5 pb-3 flex flex-wrap gap-2 border-t border-slate-700/40 pt-3">
                            {printing && (
                                <button onClick={() => onControl("jobCtl_cmd", {action: "pause"})}
                                        className="px-3 py-1.5 rounded font-mono text-xs border bg-slate-700/60 hover:bg-slate-700 text-slate-300 border-slate-600 transition-all">
                                    ⏸ Pause
                                </button>
                            )}
                            {paused && (
                                <button onClick={() => onControl("jobCtl_cmd", {action: "continue"})}
                                        className="px-3 py-1.5 rounded font-mono text-xs border bg-amber-500/20 hover:bg-amber-500/30 text-amber-400 border-amber-500/40 transition-all">
                                    ▶ Resume
                                </button>
                            )}
                            <button onClick={() => { if (confirm("Cancel the current print?")) onControl("jobCtl_cmd", {action: "cancel"}); }}
                                    className="px-3 py-1.5 rounded font-mono text-xs border bg-red-500/20 hover:bg-red-500/30 text-red-400 border-red-500/40 transition-all">
                                ✕ Cancel
                            </button>

                            {/* Light toggle */}
                            <button onClick={() => onControl("lightControl_cmd", {status: printer?.light === "open" ? "close" : "open"})}
                                    className={`ml-auto px-3 py-1.5 rounded font-mono text-xs border transition-all
                                        ${printer?.light === "open"
                                            ? "bg-amber-400/20 text-amber-400 border-amber-400/40"
                                            : "bg-slate-700/60 text-slate-500 border-slate-600"}`}>
                                💡 {printer?.light === "open" ? "On" : "Off"}
                            </button>
                        </div>
                    )}

                    {/* Clear platform — shown when print complete */}
                    {!active && printer?.file && (
                        <div className="px-4 sm:px-5 pb-3 flex flex-wrap gap-2 items-center border-t border-slate-700/40 pt-3">
                            <span className="font-mono text-xs text-slate-500">Bed clear?</span>
                            <button onClick={() => onControl("stateCtrl_cmd", {action: "setClearPlatform"})}
                                    className="px-3 py-1.5 rounded font-mono text-xs border bg-green-500/20 hover:bg-green-500/30 text-green-400 border-green-500/40 transition-all">
                                ✓ Clear platform
                            </button>
                            <button onClick={() => onControl("lightControl_cmd", {status: printer?.light === "open" ? "close" : "open"})}
                                    className={`ml-auto px-3 py-1.5 rounded font-mono text-xs border transition-all
                                        ${printer?.light === "open"
                                            ? "bg-amber-400/20 text-amber-400 border-amber-400/40"
                                            : "bg-slate-700/60 text-slate-500 border-slate-600"}`}>
                                💡 {printer?.light === "open" ? "On" : "Off"}
                            </button>
                        </div>
                    )}

                    {/* ── Expandable section ── */}
                    <button onClick={() => setExpanded(v => !v)}
                            className="w-full px-4 sm:px-5 py-2.5 flex items-center justify-between border-t border-slate-700/60 hover:bg-slate-700/20 transition-colors">
                        <span className="font-mono text-xs text-slate-500 uppercase tracking-wider">
                            {expanded ? "Less info" : "More info"}
                        </span>
                        <svg className={`w-3.5 h-3.5 text-slate-500 transition-transform ${expanded ? "rotate-180" : ""}`}
                             fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 9l-7 7-7-7"/>
                        </svg>
                    </button>

                    {expanded && (
                        <div className="border-t border-slate-700/60">
                            {/* IFS slots */}
                            {slotInfos.length > 0 && (
                                <div className="px-4 sm:px-5 py-4">
                                    <div className="text-xs text-slate-500 uppercase tracking-wider mb-3">IFS Slots</div>
                                    <div className="grid grid-cols-4 gap-2">
                                        {slotInfos.map(slot => (
                                            <div key={slot.slotId}
                                                 className={`rounded-lg p-2.5 border transition-all
                                                    ${slot.slotId === currentSlot
                                                        ? "border-amber-500/50 bg-amber-500/5"
                                                        : "border-slate-700 bg-slate-800/40"}`}>
                                                <div className="flex items-center gap-1.5 mb-1.5">
                                                    <span className="w-3 h-3 rounded-full border border-slate-500 shrink-0"
                                                          style={{backgroundColor: slot.materialColor || "#444",
                                                                  opacity: slot.hasFilament ? 1 : 0.3}}/>
                                                    <span className="font-mono text-xs text-slate-400">S{slot.slotId}</span>
                                                    {slot.slotId === currentSlot && (
                                                        <span className="font-mono text-xs text-amber-400 ml-auto">●</span>
                                                    )}
                                                </div>
                                                <div className={`font-mono text-xs ${slot.hasFilament ? "text-slate-200" : "text-slate-600"}`}>
                                                    {slot.hasFilament ? slot.materialName : "Empty"}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* Extra stats */}
                            <div className="px-4 sm:px-5 pb-4 grid grid-cols-2 gap-3 sm:grid-cols-3 border-t border-slate-700/40 pt-4">
                                <Stat label="Speed" value={printer?.current_speed != null ? `${printer.current_speed} mm/s (${printer?.print_speed ?? 100}%)` : "—"} mono/>
                                <Stat label="Cooling fan" value={printer?.cooling_fan != null ? `${printer.cooling_fan}%` : "—"} mono/>
                                <Stat label="Chamber fan" value={printer?.chamber_fan != null ? `${printer.chamber_fan}%` : "—"} mono/>
                                <Stat label="Z offset" value={printer?.z_offset != null ? `${printer.z_offset}mm` : "—"} mono/>
                                <Stat label="Door" value={printer?.door_open ? "Open" : "Closed"} mono
                                      color={printer?.door_open ? "text-orange-400" : "text-slate-400"}/>
                                <Stat label="Filament left"
                                      value={printer?.estimated_right_len ? `${Math.round(printer.estimated_right_len)}mm` : "—"} mono/>
                                <Stat label="Lifetime filament" value={printer?.cumulative_filament ? `${(printer.cumulative_filament/1000).toFixed(1)}m` : "—"} mono/>
                                <Stat label="Lifetime time" value={printer?.cumulative_time ? fmt_mins(printer.cumulative_time * 60) : "—"} mono/>
                                <Stat label="Firmware" value={printer?.firmware} mono/>
                            </div>
                        </div>
                    )}
                </div>
            </>
        );
    }

    // ── Job Card ─────────────────────────────────────────────────────────
    function JobCard({job, onDelete, onRequeue, onSend, onChangeMappings, liveSlots, isNext}) {
        const mappings = job.material_mappings || [];
        const thumbUrl = `${API}/queue/${job.id}/thumbnail`;
        const [thumbOk, setThumbOk] = useState(true);
        const [acting, setActing] = useState(null);
        const [showPicker, setShowPicker] = useState(false);

        async function doAction(name, fn) {
            setActing(name);
            try { await fn(); } finally { setActing(null); }
        }

        const isQueued  = job.status === "queued";
        const isSending = job.status === "sending";

        return (
            <>
                {showPicker && (
                    <FilamentPicker
                        job={job}
                        liveSlots={liveSlots}
                        onSave={onChangeMappings}
                        onClose={() => setShowPicker(false)}/>
                )}
            <div className={`rounded-lg border transition-all duration-200
          ${isNext
                ? "border-amber-500/50 bg-amber-500/5 shadow-[0_0_20px_rgba(245,158,11,0.08)]"
                : "border-slate-700 bg-slate-800/40 hover:border-slate-600"}`}>

                {/* Header */}
                <div className="px-3 sm:px-4 py-3 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2 border-b border-slate-700/60">
                    {/* Filename row */}
                    <div className="flex items-center gap-2 min-w-0">
                        {isNext && (
                            <span className="shrink-0 text-xs font-mono text-amber-400 border border-amber-400/40 px-1.5 py-0.5 rounded bg-amber-400/10">
                                NEXT
                            </span>
                        )}
                        <span className="font-mono text-sm text-slate-200 truncate" title={job.filename}>
                            {job.filename}
                        </span>
                    </div>
                    {/* Actions row */}
                    <div className="flex items-center gap-1.5 shrink-0">
                        <Badge status={job.status}/>
                        {!isQueued && !isSending && (
                            <button onClick={() => doAction("requeue", () => onRequeue(job.id))}
                                    disabled={!!acting}
                                    className="px-2 py-1 rounded text-xs font-mono text-slate-400 hover:text-amber-400 hover:bg-amber-400/10 border border-transparent hover:border-amber-400/30 transition-all disabled:opacity-40">
                                {acting === "requeue" ? "…" : "Requeue"}
                            </button>
                        )}
                        {/* Change Filament — only on queued jobs with mappings */}
                        {isQueued && (job.material_mappings?.length > 0 || job.tool_count > 1) && (
                            <button onClick={() => setShowPicker(true)}
                                    className="px-2 py-1 rounded text-xs font-mono text-slate-400 hover:text-purple-400 hover:bg-purple-400/10 border border-transparent hover:border-purple-400/30 transition-all">
                                Filament
                            </button>
                        )}
                        {!isSending && job.status !== "deleted" && (
                            <button onClick={() => doAction("send", () => onSend(job.id))}
                                    disabled={!!acting}
                                    className="px-2 py-1 rounded text-xs font-mono text-slate-400 hover:text-green-400 hover:bg-green-400/10 border border-transparent hover:border-green-400/30 transition-all disabled:opacity-40">
                                {acting === "send" ? "…" : "Send Now"}
                            </button>
                        )}
                        {job.status !== "deleted" && (
                            <button onClick={() => doAction("delete", () => onDelete(job.id))}
                                    disabled={!!acting}
                                    className="px-2 py-1 rounded text-xs font-mono text-slate-400 hover:text-red-400 hover:bg-red-400/10 border border-transparent hover:border-red-400/30 transition-all disabled:opacity-40">
                                {acting === "delete" ? "…" : "Remove"}
                            </button>
                        )}
                    </div>
                </div>

                <div className="flex gap-3 sm:gap-4 px-3 sm:px-4 py-3">
                    {/* Thumbnail */}
                    {thumbOk && (
                        <div className="shrink-0 w-16 h-16 sm:w-24 sm:h-24 rounded overflow-hidden border border-slate-700 bg-slate-900 flex items-center justify-center">
                            <img src={thumbUrl}
                                 alt="Model preview"
                                 className="w-full h-full object-contain"
                                 onError={() => setThumbOk(false)}/>
                        </div>
                    )}

                    {/* Stats */}
                    <div className="flex-1 flex flex-wrap gap-x-6 gap-y-2 content-start">
                        <Stat label="Size" value={fmt_size(job.file_size)} mono/>
                        <Stat label="Time" value={fmt_time(job.printing_time)} mono/>
                        <Stat label="Layers" value={job.total_layers || "—"} mono/>
                        <Stat label="Tools" value={job.tool_count ?? "—"} mono/>
                        <Stat label="Queued" value={fmt_date(job.created_at)}/>
                        {job.sent_at && <Stat label="Sent" value={fmt_date(job.sent_at)}/>}
                    </div>
                </div>

                {mappings.length > 0 && (
                    <div className="px-3 sm:px-4 pb-3 flex flex-wrap gap-2">
                        {mappings.map((m, i) => (
                            <div key={i}
                                 className="flex items-center gap-1.5 px-2 py-1 rounded bg-slate-700/60 border border-slate-600/50 text-xs font-mono">
                  <span className="w-3 h-3 rounded-full border border-slate-500 shrink-0"
                        style={{backgroundColor: m.slotMaterialColor || m.toolMaterialColor || "#888"}}/>
                                <span className="text-slate-400">T{m.toolId}</span>
                                <span className="text-slate-600">→</span>
                                <span className="text-slate-300">S{m.slotId}</span>
                                <span className="text-slate-500 ml-0.5">{m.materialName}</span>
                            </div>
                        ))}
                    </div>
                )}

                {job.error && (
                    <div className="mx-3 sm:mx-4 mb-3 px-3 py-2 rounded bg-red-950/60 border border-red-500/30 text-xs font-mono text-red-400">
                        {job.error}
                    </div>
                )}
            </div>
            </>
        );
    }

    // ── Filament Picker Modal ─────────────────────────────────────────────
    function FilamentPicker({job, liveSlots, onSave, onClose}) {
        // Initialise selections from current mappings
        const [selections, setSelections] = useState(() => {
            const map = {};
            (job.material_mappings || []).forEach(m => {
                map[m.toolId] = {...m};
            });
            return map;
        });

        const toolCount = job.tool_count || (job.material_mappings || []).length || 1;
        const tools = Array.from({length: toolCount}, (_, i) => i);

        function selectSlot(toolId, slot) {
            setSelections(prev => ({
                ...prev,
                [toolId]: {
                    ...prev[toolId],
                    toolId,
                    slotId:            slot.slotId,
                    materialName:      slot.materialName,
                    slotMaterialColor: slot.materialColor,
                    toolMaterialColor: slot.materialColor,
                },
            }));
        }

        async function save() {
            const mappings = Object.values(selections);
            await onSave(job.id, mappings);
            onClose();
        }

        return (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4"
                 style={{background: "rgba(0,0,0,0.75)", backdropFilter: "blur(4px)"}}
                 onClick={onClose}>
                <div className="rounded-xl border border-slate-700 bg-slate-900 w-full max-w-md shadow-2xl"
                     onClick={e => e.stopPropagation()}>

                    {/* Header */}
                    <div className="px-5 py-4 border-b border-slate-700 flex items-center justify-between">
                        <div>
                            <div className="font-mono text-sm font-bold text-slate-100">Change Filament</div>
                            <div className="font-mono text-xs text-slate-500 mt-0.5 truncate max-w-[280px]"
                                 title={job.filename}>{job.filename}</div>
                        </div>
                        <button onClick={onClose} className="text-slate-500 hover:text-slate-300 transition-colors p-1">
                            <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/>
                            </svg>
                        </button>
                    </div>

                    {/* Tool → Slot assignments */}
                    <div className="px-5 py-4 space-y-5">
                        {tools.map(toolId => {
                            const current = selections[toolId];
                            return (
                                <div key={toolId}>
                                    <div className="flex items-center gap-2 mb-2">
                                        <span className="font-mono text-xs text-slate-400 uppercase tracking-wider">
                                            Tool {toolId}
                                        </span>
                                        {current && (
                                            <div className="flex items-center gap-1.5 ml-2">
                                                <span className="w-3 h-3 rounded-full border border-slate-500"
                                                      style={{backgroundColor: current.slotMaterialColor || "#888"}}/>
                                                <span className="font-mono text-xs text-slate-400">
                                                    → S{current.slotId} {current.materialName}
                                                </span>
                                            </div>
                                        )}
                                    </div>

                                    {/* Slot buttons */}
                                    {liveSlots.length > 0 ? (
                                        <div className="grid grid-cols-4 gap-2">
                                            {liveSlots.map(slot => {
                                                const selected = current?.slotId === slot.slotId;
                                                return (
                                                    <button key={slot.slotId}
                                                            onClick={() => selectSlot(toolId, slot)}
                                                            disabled={!slot.hasFilament}
                                                            className={`rounded-lg p-2.5 border text-left transition-all disabled:opacity-30 disabled:cursor-not-allowed
                                                                ${selected
                                                                    ? "border-amber-500/70 bg-amber-500/10"
                                                                    : "border-slate-700 bg-slate-800/60 hover:border-slate-500"}`}>
                                                        <div className="flex items-center gap-1.5 mb-1">
                                                            <span className="w-3.5 h-3.5 rounded-full border border-slate-500 shrink-0"
                                                                  style={{backgroundColor: slot.materialColor || "#444"}}/>
                                                            {selected && <span className="text-amber-400 text-xs ml-auto">✓</span>}
                                                        </div>
                                                        <div className="font-mono text-xs text-slate-300">S{slot.slotId}</div>
                                                        <div className={`font-mono text-xs mt-0.5 ${slot.hasFilament ? "text-slate-400" : "text-slate-600"}`}>
                                                            {slot.hasFilament ? slot.materialName : "Empty"}
                                                        </div>
                                                    </button>
                                                );
                                            })}
                                        </div>
                                    ) : (
                                        <div className="font-mono text-xs text-slate-500 py-2">
                                            Printer offline — slot data unavailable
                                        </div>
                                    )}
                                </div>
                            );
                        })}
                    </div>

                    {/* Footer */}
                    <div className="px-5 py-4 border-t border-slate-700 flex justify-end gap-2">
                        <button onClick={onClose}
                                className="px-4 py-2 rounded font-mono text-sm text-slate-400 hover:text-slate-200 border border-transparent hover:border-slate-600 transition-all">
                            Cancel
                        </button>
                        <button onClick={save}
                                className="px-4 py-2 rounded font-mono text-sm font-medium bg-amber-500 hover:bg-amber-400 text-slate-900 border border-amber-400 transition-all">
                            Save mappings
                        </button>
                    </div>
                </div>
            </div>
        );
    }
    function QueueList({queued, display, nextId, liveSlots, onDelete, onRequeue, onSend, onChangeMappings, onReorder}) {
        const [dragId, setDragId] = useState(null);
        const [overId, setOverId] = useState(null);

        const nonQueued = display.filter(j => j.status !== "queued");

        function handleDragStart(e, id) {
            setDragId(id);
            e.dataTransfer.effectAllowed = "move";
        }

        function handleDragOver(e, id) {
            e.preventDefault();
            e.dataTransfer.dropEffect = "move";
            if (id !== dragId) setOverId(id);
        }

        function handleDrop(e, targetId) {
            e.preventDefault();
            if (dragId === targetId) {
                setDragId(null);
                setOverId(null);
                return;
            }
            const ids = queued.map(j => j.id);
            const from = ids.indexOf(dragId);
            const to = ids.indexOf(targetId);
            if (from === -1 || to === -1) return;
            const reordered = [...ids];
            reordered.splice(from, 1);
            reordered.splice(to, 0, dragId);
            setDragId(null);
            setOverId(null);
            onReorder(reordered);
        }

        function handleDragEnd() {
            setDragId(null);
            setOverId(null);
        }

        if (display.length === 0) return <EmptyQueue/>;

        return (
            <div className="space-y-3">
                {queued.map(job => (
                    <div key={job.id}
                         draggable
                         onDragStart={e => handleDragStart(e, job.id)}
                         onDragOver={e => handleDragOver(e, job.id)}
                         onDrop={e => handleDrop(e, job.id)}
                         onDragEnd={handleDragEnd}
                         className={`transition-all duration-150 rounded-lg
                   ${dragId === job.id ? "opacity-40 scale-[0.98]" : ""}
                   ${overId === job.id && dragId !== job.id
                             ? "ring-2 ring-amber-400/60 ring-offset-2 ring-offset-slate-900"
                             : ""}`}>
                        <div className="flex items-stretch gap-0">
                            <div
                                className="flex items-center px-2 cursor-grab active:cursor-grabbing text-slate-600 hover:text-slate-400 transition-colors shrink-0">
                                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5}
                                          d="M4 8h16M4 16h16"/>
                                </svg>
                            </div>
                            <div className="flex-1 min-w-0">
                                <JobCard job={job} onDelete={onDelete} onRequeue={onRequeue}
                                         onSend={onSend} onChangeMappings={onChangeMappings}
                                         liveSlots={liveSlots} isNext={job.id === nextId}/>
                            </div>
                        </div>
                    </div>
                ))}

                {nonQueued.map(job => (
                    <JobCard key={job.id} job={job} onDelete={onDelete}
                             onRequeue={onRequeue} onSend={onSend}
                             onChangeMappings={onChangeMappings}
                             liveSlots={liveSlots} isNext={job.id === nextId}/>
                ))}
            </div>
        );
    }

    function EmptyQueue() {
        return (
            <div className="flex flex-col items-center justify-center py-20 text-center">
                <svg className="w-12 h-12 text-slate-800 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1}
                          d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/>
                </svg>
                <p className="font-mono text-slate-500 text-sm">Queue is empty</p>
                <p className="font-mono text-slate-600 text-xs mt-1">Upload a job from OrcaSlicer to get started</p>
            </div>
        );
    }

    // ── App ───────────────────────────────────────────────────────────────
    function App() {
        const [status, setStatus] = useState(null);
        const [jobs, setJobs] = useState([]);
        const [toasts, setToasts] = useState([]);
        const [loadingStatus, setLoadingStatus] = useState(true);
        const [loadingAction, setLoadingAction] = useState(null);
        const [showDeleted, setShowDeleted] = useState(false);

        const toast = useCallback((msg, type = "success") => {
            const id = Date.now();
            setToasts(t => [...t, {id, msg, type}]);
            setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
        }, []);

        const refresh = useCallback(async () => {
            try {
                const [sr, jr] = await Promise.all([
                    fetch(`${API}/queue/status`),
                    fetch(`${API}/queue?include_deleted=true`),
                ]);
                setStatus(await sr.json());
                setJobs((await jr.json()).jobs || []);
            } catch {
                setStatus(s => s ? {...s, printer: {state: "offline"}} : null);
            } finally {
                setLoadingStatus(false);
            }
        }, []);

        useEffect(() => {
            refresh();
            const id = setInterval(refresh, 5000);
            return () => clearInterval(id);
        }, [refresh]);

        async function action(name, url, method = "POST", successMsg) {
            setLoadingAction(name);
            try {
                const r = await fetch(`${API}${url}`, {method});
                const d = await r.json();
                if (!r.ok) throw new Error(d.detail || "Failed");
                toast(successMsg ? successMsg(d) : "Done");
                await refresh();
            } catch (e) {
                toast(e.message, "error");
            } finally {
                setLoadingAction(null);
            }
        }

        async function controlPrinter(cmd, args) {
            try {
                const r = await fetch(`${API}/printer/control`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({cmd, args}),
                });
                const d = await r.json();
                if (d.code !== 0) throw new Error(d.message || "Command failed");
                await refresh();
            } catch(e) {
                toast(e.message, "error");
            }
        }

        async function changeMappings(id, mappings) {
            try {
                const r = await fetch(`${API}/queue/${id}/mappings`, {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({material_mappings: mappings}),
                });
                if (!r.ok) throw new Error((await r.json()).detail || "Failed");
                toast("Filament mappings updated");
                await refresh();
            } catch(e) {
                toast(e.message, "error");
            }
        }

        const sendNext = () => action("next", "/queue/next", "POST", d => `Sent: ${d.job?.filename}`);
        const clearQueue = () => action("clear", "/queue/clear", "POST", d => `Cleared ${d.cleared} job${d.cleared !== 1 ? "s" : ""}`);
        const purge = () => action("purge", "/queue/cleanup", "POST", d => `Purged ${d.purged_rows} rows, ${d.removed_files.length} files`);

        async function deleteJob(id) {
            try {
                await fetch(`${API}/queue/${id}`, {method: "DELETE"});
                await refresh();
            } catch (e) {
                toast(e.message, "error");
            }
        }

        async function requeueJob(id) {
            try {
                const r = await fetch(`${API}/queue/${id}/requeue`, {method: "POST"});
                if (!r.ok) throw new Error((await r.json()).detail || "Failed");
                toast("Job requeued");
                await refresh();
            } catch (e) {
                toast(e.message, "error");
            }
        }

        async function sendSpecific(id) {
            try {
                const r = await fetch(`${API}/queue/${id}/send`, {method: "POST"});
                const d = await r.json();
                if (!r.ok) throw new Error(d.detail || "Failed");
                toast(`Sent: ${d.job?.filename}`);
                await refresh();
            } catch (e) {
                toast(e.message, "error");
            }
        }

        const queued = jobs.filter(j => j.status === "queued");
        const sending = jobs.filter(j => j.status === "sending");
        const sent = jobs.filter(j => j.status === "sent");
        const errors = jobs.filter(j => j.status === "error");
        const deleted = jobs.filter(j => j.status === "deleted");
        const hasActive = queued.length > 0 || sending.length > 0;
        const nextId = status?.next_job?.id;
        const display = [
            ...sending, ...errors, ...queued,
            ...[...sent].sort((a, b) => (b.sent_at ?? 0) - (a.sent_at ?? 0)),
            ...(showDeleted ? [...deleted].reverse() : []),
        ];

        return (
            <div className="min-h-screen" style={{background: "#0F1117", fontFamily: "'Inter',sans-serif"}}>

                <header
                    className="border-b border-slate-800 px-4 sm:px-6 py-3 sm:py-4 flex items-center justify-between sticky top-0 z-40"
                    style={{background: "rgba(15,17,23,0.95)", backdropFilter: "blur(8px)"}}>
                    <div className="flex items-center gap-2 sm:gap-3">
                        <div className="w-7 h-7 rounded bg-amber-500/20 border border-amber-500/40 flex items-center justify-center shrink-0">
                            <svg className="w-4 h-4 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5}
                                      d="M17 17H7a2 2 0 01-2-2V5a2 2 0 012-2h10a2 2 0 012 2v10a2 2 0 01-2 2z"/>
                            </svg>
                        </div>
                        <span className="font-mono font-bold text-slate-100 tracking-tight">print queue</span>
                        <span className="font-mono text-xs text-slate-600 hidden sm:block">AD5X</span>
                    </div>

                    <div className="flex items-center gap-1.5 sm:gap-2">
                        <span className="font-mono text-xs text-slate-600 mr-1 hidden sm:block">
                            {jobs.length} job{jobs.length !== 1 ? "s" : ""}
                        </span>
                        {/* Send Next — primary, always show text */}
                        <Btn onClick={sendNext} disabled={!hasActive} loading={loadingAction === "next"} variant="primary">
                            <span className="hidden sm:inline">Send Next</span>
                            <span className="sm:hidden">Send</span>
                        </Btn>
                        {/* Clear — icon on mobile, text on sm+ */}
                        <button onClick={clearQueue} disabled={!hasActive || loadingAction === "clear"}
                                title="Clear queue"
                                className="inline-flex items-center gap-1.5 px-2.5 sm:px-4 py-2 rounded font-mono text-sm font-medium border transition-all duration-150 disabled:opacity-40 disabled:cursor-not-allowed bg-slate-700 hover:bg-slate-600 text-slate-100 border-slate-600">
                            {loadingAction === "clear"
                                ? <svg className="animate-spin w-3.5 h-3.5" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>
                                : <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>
                            }
                            <span className="hidden sm:inline">Clear Queue</span>
                        </button>
                        {/* Purge — icon on mobile, text on sm+ */}
                        <button onClick={purge} disabled={loadingAction === "purge"}
                                title="Purge deleted jobs"
                                className="inline-flex items-center gap-1.5 px-2.5 sm:px-4 py-2 rounded font-mono text-sm font-medium border transition-all duration-150 disabled:opacity-40 disabled:cursor-not-allowed bg-red-500/20 hover:bg-red-500/30 text-red-400 border-red-500/40">
                            {loadingAction === "purge"
                                ? <svg className="animate-spin w-3.5 h-3.5" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>
                                : <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                            }
                            <span className="hidden sm:inline">Purge</span>
                        </button>
                    </div>
                </header>

                <main className="max-w-4xl mx-auto px-3 sm:px-6 py-4 sm:py-6 space-y-4 sm:space-y-5">

                    <PrinterPanel printer={status?.printer} loading={loadingStatus} onControl={controlPrinter}/>

                    {/* Stats strip — 2 col on mobile, 5 across on sm+ */}
                    <div className="grid grid-cols-2 gap-2 sm:flex sm:gap-2">
                        {[
                            {label: "Queued",  val: queued.length,  col: "text-amber-400"},
                            {label: "Sending", val: sending.length, col: "text-blue-400"},
                            {label: "Sent",    val: sent.length,    col: "text-green-400"},
                            {label: "Errors",  val: errors.length,  col: "text-red-400"},
                        ].map(s => (
                            <div key={s.label}
                                 className="flex-1 rounded-lg border border-slate-700 bg-slate-800/40 px-3 py-2.5 flex items-center gap-2.5 sm:flex-col sm:items-center sm:px-4 sm:py-3">
                                <span className={`font-mono text-xl font-bold sm:text-2xl ${s.col}`}
                                      style={{textShadow: "0 0 16px currentColor"}}>
                                    {s.val}
                                </span>
                                <span className="font-mono text-xs text-slate-500 uppercase tracking-wider">{s.label}</span>
                            </div>
                        ))}

                        {/* Removed toggle */}
                        <button onClick={() => setShowDeleted(v => !v)}
                                className={`col-span-2 sm:col-auto flex-1 rounded-lg border px-3 py-2.5 flex items-center gap-2.5 sm:flex-col sm:items-center sm:px-4 sm:py-3 transition-all
                                    ${showDeleted
                                        ? "border-slate-500 bg-slate-700/60"
                                        : "border-slate-700 bg-slate-800/40 hover:border-slate-600"}`}>
                            <span className={`font-mono text-xl font-bold sm:text-2xl ${showDeleted ? "text-slate-300" : "text-slate-600"}`}>
                                {deleted.length}
                            </span>
                            <span className={`font-mono text-xs uppercase tracking-wider ${showDeleted ? "text-slate-400" : "text-slate-600"}`}>
                                {showDeleted ? "Removed ✓" : "Removed"}
                            </span>
                        </button>
                    </div>

                    <QueueList
                        queued={queued}
                        display={display}
                        nextId={nextId}
                        liveSlots={status?.printer?.slot_infos || []}
                        onDelete={deleteJob}
                        onRequeue={requeueJob}
                        onSend={sendSpecific}
                        onChangeMappings={changeMappings}
                        onReorder={async (orderedIds) => {
                            try {
                                await fetch(`${API}/queue/reorder`, {
                                    method: "POST",
                                    headers: {"Content-Type": "application/json"},
                                    body: JSON.stringify({order: orderedIds}),
                                });
                                await refresh();
                            } catch (e) {
                                toast(e.message, "error");
                            }
                        }}
                    />
                </main>

                <Toast toasts={toasts}/>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App/>);
</script>
</body>
</html>
